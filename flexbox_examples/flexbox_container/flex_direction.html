<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex-direction-examples</title>
  <style>
    #row {
      display: flex;
      flex-direction: row;
    }

    #column {
      display: flex;
      flex-direction: column;
    }

    #row-reverse {
      display: flex;
      flex-direction: row-reverse;
    }

    #column-reverse {
      display: flex;
      flex-direction: column-reverse;
    }

    .outer {
      width: 1000px;
      margin-bottom: 30px;
      background-color: #252422;
    }

    .outer div {
      font-size: 20px;
      padding: 20px;
      background-color: #eb5e28;
      color: white;
      margin: 10px;
    }
  </style>
</head>

<body>

  <div id="row" class="outer">
    <div>row</div>
    <div>1</div>
    <div>2</div>
    <div>3</div>
  </div>

  <div id="column" class="outer">
    <div>column</div>
    <div>1</div>
    <div>2</div>
    <div>3</div>
  </div>

  <div id="row-reverse" class="outer">
    <div>row-reverse</div>
    <div>1</div>
    <div>2</div>
    <div>3</div>
  </div>

  <div id="column-reverse" class="outer">
    <div>column-reverse</div>
    <div>1</div>
    <div>2</div>
    <div>3</div>
  </div>

</body>

</html>
